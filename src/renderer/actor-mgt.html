<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: https://images.igdb.com https://image.tmdb.org;">
    <title>演员管理</title>
    <link rel="stylesheet" href="css/themes/dark.css">
    <link rel="stylesheet" href="css/management.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app">
        <!-- 标题栏 -->
        <header class="management-titlebar">
            <h1 id="window-title">演员管理</h1>
            <button id="close-btn" class="titlebar-close-btn">&times;</button>
        </header>

        <!-- 工具栏 -->
        <div class="management-toolbar">
            <div class="toolbar-search">
                <div class="search-input-with-btn">
                    <input type="text" id="search-input" placeholder="搜索演员（姓名、昵称）...">
                    <button id="search-btn" class="icon-btn">🔍</button>
                </div>
            </div>
            <div class="toolbar-actions">
                <button id="batch-search-actor-btn" class="btn btn-secondary" style="display: none;">
                    批量搜索 (<span id="selected-count">0</span>)
                </button>
                <button id="add-actor-btn" class="btn btn-primary">新建演员</button>
                <div class="view-toggle">
                    <button id="view-card-btn" class="btn btn-icon active" title="卡片视图">▦</button>
                    <button id="view-table-btn" class="btn btn-icon" title="表格视图">☰</button>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <main class="management-main">
            <!-- 卡片视图 -->
            <div class="actor-content" id="card-view">
                <div class="actor-cards" id="actor-cards">
                    <!-- 动态生成 -->
                </div>
                <div class="empty-state" id="empty-card-list" style="display: none;">
                    <div class="empty-icon">👤</div>
                    <p>暂无演员</p>
                    <p>点击"新建演员"添加</p>
                </div>
            </div>

            <!-- 表格视图 -->
            <div class="actor-content" id="table-view" style="display: none;">
                <table class="actor-table" id="actor-table">
                    <thead>
                        <tr>
                            <th>照片</th>
                            <th>姓名</th>
                            <th>昵称</th>
                            <th>生日</th>
                            <th>备注</th>
                            <th>评分</th>
                            <th>收藏</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="actor-table-body">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
                <div class="empty-state" id="empty-table-list" style="display: none;">
                    <div class="empty-icon">👤</div>
                    <p>暂无演员</p>
                    <p>点击"新建演员"添加</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 演员模态框 -->
    <div id="actor-modal" class="modal" style="display: none;">
        <div class="modal-content modal-middle">
            <div class="modal-header">
                <h2 id="modal-title">新建演员</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body actor-modal-body">
                <!-- 左侧：照片区域 -->
                <div class="actor-photo-section">
                    <div class="photo-preview" id="photo-preview">
                        <div class="photo-placeholder">点击上传照片</div>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" style="display: none;">
                    <div class="photo-buttons">
                        <button type="button" id="select-photo-btn" class="btn btn-secondary">选择照片</button>
                        <button type="button" id="remove-photo-btn" class="btn btn-secondary" style="display: none;">移除照片</button>
                    </div>
                </div>
                <!-- 右侧：表单区域 -->
                <div class="actor-form-section">
                    <form id="actor-form">
                        <input type="hidden" id="original-name">
                        <div class="form-group">
                            <label for="actor-name">姓名 *</label>
                            <div class="search-input-group">
                                <input type="text" id="actor-name" placeholder="输入演员姓名" required>
                                <button type="button" id="actor-search-trigger-btn" class="btn btn-secondary">搜索</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="actor-nickname">昵称</label>
                            <input type="text" id="actor-nickname" placeholder="输入演员昵称">
                        </div>
                        <div class="form-group">
                            <label for="actor-birthday">生日</label>
                            <input type="date" id="actor-birthday">
                        </div>
                        <div class="form-group">
                            <label for="actor-memo">备注</label>
                            <textarea id="actor-memo" rows="3" placeholder="输入备注信息"></textarea>
                        </div>
                        <div class="form-group rating-favorite-row">
                            <div class="rating-section">
                                <label>评分</label>
                                <div class="rating-selector compact" id="rating-selector">
                                    <span class="rating-star compact-star" data-rating="1">⭐</span>
                                    <span class="rating-star compact-star" data-rating="2">⭐</span>
                                    <span class="rating-star compact-star" data-rating="3">⭐</span>
                                    <span class="rating-star compact-star" data-rating="4">⭐</span>
                                    <span class="rating-star compact-star" data-rating="5">⭐</span>
                                </div>
                            </div>
                            <div class="favorite-section">
                                <label>收藏</label>
                                <div class="favorite-selector" id="favorite-selector">
                                    <span class="favorite-heart compact-heart" id="favorite-heart">♡</span>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-btn" class="btn btn-primary">保存</button>
                <button id="cancel-btn" class="btn btn-secondary">取消</button>
                <button id="delete-btn" class="btn btn-danger" style="display: none;">删除</button>
            </div>
        </div>
    </div>

    <!-- 演员评分模态框 -->
    <div id="actor-rating-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="rating-actor-name">演员</h2>
                <button class="close-btn" id="close-rating-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <label class="modal-section-label">收藏</label>
                    <div class="favorite-selector-modal">
                        <span class="favorite-heart-modal" id="favorite-heart-modal">♡</span>
                        <span class="favorite-text" id="favorite-text">未收藏</span>
                    </div>
                </div>
                <div class="modal-section" style="margin-top: 15px;">
                    <label class="modal-section-label">评分</label>
                    <div class="rating-selector" id="rating-modal-selector">
                        <span class="rating-star modal-rating-star" data-rating="1">⭐</span>
                        <span class="rating-star modal-rating-star" data-rating="2">⭐</span>
                        <span class="rating-star modal-rating-star" data-rating="3">⭐</span>
                        <span class="rating-star modal-rating-star" data-rating="4">⭐</span>
                        <span class="rating-star modal-rating-star" data-rating="5">⭐</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="confirm-rating-btn" class="btn btn-primary">确定</button>
                <button id="cancel-rating-btn" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- 演员搜索弹窗 -->
    <div id="actor-search-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>演员库搜索</h2>
                <button class="close-btn" id="close-actor-search">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 搜索配置区域 -->
                <div class="actor-search-config">
                    <div class="form-group">
                        <label>搜索适配器：</label>
                        <div class="actor-adapter-options">
                            <label class="actor-adapter-radio">
                                <input type="radio" name="actor-adapter" value="tmdb" checked>
                                <span>TMDB演员搜索</span>
                            </label>
                            <label class="actor-adapter-radio">
                                <input type="radio" name="actor-adapter" value="r18">
                                <span>R18演员搜索</span>
                            </label>
                        </div>
                    </div>
                </div>
                <!-- 搜索区域 -->
                <div class="form-group actor-search-section">
                    <label>演员名称：</label>
                    <div class="search-input-group">
                        <input type="text" id="actor-search-input" class="form-input" placeholder="输入演员名称">
                        <button id="actor-search-btn" class="btn btn-secondary">搜索</button>
                    </div>
                </div>
                <!-- 搜索状态 -->
                <div id="actor-search-loading" class="actor-loading" style="display: none;">
                    <span>搜索中...</span>
                </div>
                <div id="actor-search-error" class="actor-error" style="display: none;"></div>
                <!-- 搜索结果列表 -->
                <div id="actor-search-results" class="actor-results"></div>
            </div>
            <div class="modal-footer">
                <button id="confirm-actor-search" class="btn btn-primary" disabled>确认</button>
                <button id="cancel-actor-search" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- 批量演员搜索弹窗 -->
    <div id="batch-actor-search-modal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>批量演员搜索</h2>
                <button class="close-btn" id="close-batch-actor-search">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 批量搜索工具栏 -->
                <div class="batch-search-toolbar">
                    <span id="batch-actor-progress">准备就绪</span>
                    <div class="batch-search-actions">
                        <button id="batch-actor-search-btn" class="btn btn-primary">搜索</button>
                        <button id="batch-actor-save-btn" class="btn btn-primary" style="display: none;">保存</button>
                        <button id="batch-actor-close-btn" class="btn btn-secondary">关闭</button>
                    </div>
                </div>
                <!-- 搜索配置区域 -->
                <div class="batch-actor-config">
                    <div class="form-group">
                        <label>搜索适配器：</label>
                        <div class="actor-adapter-options">
                            <label class="actor-adapter-radio">
                                <input type="radio" name="batch-actor-adapter" value="tmdb" checked>
                                <span>TMDB演员搜索</span>
                            </label>
                            <label class="actor-adapter-radio">
                                <input type="radio" name="batch-actor-adapter" value="r18">
                                <span>R18演员搜索</span>
                            </label>
                        </div>
                    </div>
                </div>
                <!-- 批量搜索结果表格 -->
                <div class="batch-actor-results-container">
                    <table class="batch-actor-table">
                        <thead>
                            <tr>
                                <th class="col-name">姓名</th>
                                <th class="col-birthday">生日</th>
                                <th class="col-memo">备注</th>
                                <th class="col-photo">照片</th>
                                <th class="col-status">状态</th>
                            </tr>
                        </thead>
                        <tbody id="batch-actor-results-body">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils/common-utils.js"></script>
    <script src="js/actor-mgt.js"></script>
</body>
</html>
