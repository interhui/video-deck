<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file: https://image.tmdb.org https://pics.dmm.co.jp;">
    <title>电影盒子</title>
    <link rel="stylesheet" href="css/themes/dark.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/box.css">
</head>
<body>
    <div id="app">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <button id="back-btn" class="icon-btn" title="返回">←</button>
                <h2 id="box-title" class="box-title">电影盒子</h2>
            </div>
            <div class="toolbar-right">
                <button id="export-btn" class="btn btn-secondary">导出</button>
                <button id="play-btn" class="btn btn-primary">播放</button>
                <button id="batch-remove-btn" class="batch-action" style="display: none;">批量移除</button>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索电影...">
                    <button id="search-btn" class="icon-btn">🔍</button>
                    <button id="clear-search-btn" class="icon-btn clear-search-btn" style="display: none;">✕</button>
                </div>
                <div class="view-toggle">
                    <button id="view-card-btn" class="btn btn-icon active" title="卡片视图">▦</button>
                    <button id="view-table-btn" class="btn btn-icon" title="表格视图">☰</button>
                </div>
                <button id="minimize-btn" class="titlebar-minimize-btn" title="最小化">─</button>
                <button id="close-btn" class="titlebar-close-btn" title="关闭">&times;</button>
            </div>
        </header>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <span id="total-movies">电影总数：0</span>
            <span id="new-movies">新电影：0</span>
            <span id="played-movies">已看：0</span>
            <span id="playing-movies">观看中：0</span>
            <span id="unplayed-movies">未观看：0</span>
        </div>

        <!-- 主内容区：分栏布局 -->
        <main class="box-main-content">
            <!-- 左侧：分类列表 -->
            <aside class="box-sidebar" id="box-sidebar">
                <h3>电影库</h3>
                <ul class="box-category-list" id="category-list">
                    <!-- 动态生成 -->
                </ul>
                <!-- 盒子描述信息 -->
                <div class="box-description" id="box-description" style="display: none;">
                    <p id="box-description-text"></p>
                </div>
            </aside>

            <!-- 可拖动分隔线 -->
            <div class="splitter" id="box-splitter"></div>

            <!-- 右侧：电影展示区 -->
            <section class="box-movie-wall" id="box-movie-wall">
                <!-- 过滤栏 -->
                <div class="box-filter-bar">
                     <select id="sort-select" class="filter-select">
                        <option value="name-asc">名称 ↑</option>
                        <option value="name-desc">名称 ↓</option>
                        <option value="rating-desc">评分 ↓</option>
                        <option value="rating-asc">评分 ↑</option>
                        <option value="addtime-asc">添加时间 ↑</option>
                        <option value="addtime-desc">添加时间 ↓</option>
                    </select>
                    <select id="category-filter" class="filter-select">
                        <option value="">全部分类</option>
                    </select>
                    <select id="status-filter" class="filter-select">
                        <option value="">全部状态</option>
                        <option value="new">新电影</option>
                        <option value="unwatched">未观看</option>
                        <option value="watching">观看中</option>
                        <option value="completed">已完成</option>
                    </select>
                    <select id="tag-filter" class="filter-select">
                        <option value="">全部标签</option>
                    </select>
                    <select id="rating-filter" class="filter-select">
                        <option value="">全部评分</option>
                        <option value="5">⭐⭐⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="3">⭐⭐⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="1">⭐</option>
                    </select>

                </div>

                <!-- 电影网格 -->
                <div class="box-movies-grid" id="movies-grid">
                    <!-- 电影卡片将通过 JS 动态生成 -->
                </div>
                <div class="empty-state" id="empty-state" style="display: none;">
                    <p>暂无电影</p>
                    <p>请在电影详情中添加电影到盒子</p>
                </div>
            </section>
        </main>
    </div>

    <!-- 修改观看状态弹窗 -->
    <div id="status-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>修改电影信息</h2>
                <button id="close-status-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="status-movie-name" class="status-movie-name"></p>
                <div class="modal-section">
                    <label class="modal-section-label">状态</label>
                    <div class="status-radio-group">
                        <label class="status-radio">
                            <input type="radio" name="status" value="new">
                            <span class="status-dot new"></span>
                            <span>新电影</span>
                        </label>
                        <label class="status-radio">
                            <input type="radio" name="status" value="unwatched">
                            <span class="status-dot unwatched"></span>
                            <span>未观看</span>
                        </label>
                        <label class="status-radio">
                            <input type="radio" name="status" value="watching">
                            <span class="status-dot watching"></span>
                            <span>观看中</span>
                        </label>
                        <label class="status-radio">
                            <input type="radio" name="status" value="completed">
                            <span class="status-dot completed"></span>
                            <span>已完成</span>
                        </label>
                    </div>
                </div>
                <div class="modal-section">
                    <label class="modal-section-label">评分</label>
                    <div class="rating-selector">
                        <span class="rating-star" data-rating="1">☆</span>
                        <span class="rating-star" data-rating="2">☆</span>
                        <span class="rating-star" data-rating="3">☆</span>
                        <span class="rating-star" data-rating="4">☆</span>
                        <span class="rating-star" data-rating="5">☆</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-status-btn" class="btn btn-secondary">取消</button>
                <button id="confirm-status-btn" class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <!-- 标签过滤模态窗 -->
    <div id="tag-filter-modal" class="modal" style="display: none;">
        <div class="modal-content tag-filter-modal-content">
            <div class="modal-header">
                <h2>标签筛选选择</h2>
                <button class="close-btn" id="close-tag-filter">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 工具条 -->
                <div class="tag-filter-toolbar">
                    <div class="tag-filter-right">
                        <div class="search-box tag-filter-search">
                            <input type="text" id="tag-filter-search-input" placeholder="搜索标签（ID、名称）...">
                            <button id="tag-filter-search-btn" class="icon-btn">🔍</button>
                            <button id="tag-filter-clear-btn" class="icon-btn clear-search-btn" style="display: none;">✕</button>
                        </div>
                    </div>
                </div>
                <!-- 标签列表 -->
                <div class="tag-filter-list" id="tag-filter-list">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="confirm-tag-filter" class="btn btn-primary">确定</button>
                <button id="cancel-tag-filter" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- 导出电影弹窗 -->
    <div id="export-modal" class="modal" style="display: none;">
        <div class="modal-content export-modal-content">
            <div class="modal-header">
                <h2>导出电影盒子</h2>
                <button id="close-export-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="export-box-name" class="export-box-name"></p>
                <div class="modal-section">
                    <label class="modal-section-label">导出格式</label>
                    <div class="export-radio-group">
                        <label class="export-radio">
                            <input type="radio" name="export-type" value="zip">
                            <span class="export-radio-label">ZIP格式</span>
                            <span class="export-radio-desc">压缩电影目录（包含movie.nfo和poster文件）</span>
                        </label>
                        <label class="export-radio">
                            <input type="radio" name="export-type" value="csv">
                            <span class="export-radio-label">CSV格式</span>
                            <span class="export-radio-desc">导出电影信息表格</span>
                        </label>
                        <label class="export-radio">
                            <input type="radio" name="export-type" value="json">
                            <span class="export-radio-label">JSON格式</span>
                            <span class="export-radio-desc">导出盒子原始JSON文件</span>
                        </label>
                        <label class="export-radio">
                            <input type="radio" name="export-type" value="dpl">
                            <span class="export-radio-label">PotPlayer播放列表</span>
                            <span class="export-radio-desc">导出为DPL格式播放列表</span>
                        </label>
                    </div>
                </div>
                <div class="modal-section export-filter-section">
                    <label class="export-checkbox">
                        <input type="checkbox" id="export-with-video">
                        <span class="export-checkbox-label">仅导出包含视频文件</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-export-btn" class="btn btn-secondary">取消</button>
                <button id="confirm-export-btn" class="btn btn-primary">导出</button>
            </div>
        </div>
    </div>

    <script src="js/utils/common-utils.js"></script>
    <script src="js/utils/lazy-loader.js"></script>
    <script src="js/box.js"></script>
</body>
</html>
