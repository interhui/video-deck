<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' file:;">
    <title>电影播放器</title>
    <link rel="stylesheet" href="css/themes/dark.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>
    <div id="app">
        <header class="player-header">
            <div id="player-title" class="player-title">电影播放</div>
            <div class="window-controls">
                <button id="minimize-btn" class="window-btn minimize-btn" title="最小化">─</button>
                <button id="close-btn" class="window-btn close-btn" title="关闭">&times;</button>
            </div>
        </header>

        <main class="player-content">
            <div class="video-section">
                <div class="video-container">
                    <video id="video-player" preload="metadata">
                        您的浏览器不支持 video 标签
                    </video>
                </div>
                <div class="video-controls">
                    <div class="controls-top-row">
                        <div class="progress-group">
                            <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0" step="0.1">
                            <div class="time-group">
                                <span id="current-time" class="time-display">00:00</span>
                                <span class="time-separator">/</span>
                                <span id="total-time" class="time-display">00:00</span>
                            </div>
                        </div>
                        <div class="volume-group">
                            <button id="mute-btn" class="volume-btn" title="静音">🔊</button>
                            <input type="range" id="volume-bar" class="volume-bar" min="0" max="100" value="100">
                        </div>
                    </div>
                    <div class="playback-controls">
                        <button id="play-pause-btn" class="playback-btn play-btn" title="播放/暂停">▶</button>
                        <button id="stop-btn" class="playback-btn stop-btn" title="停止">◼︎</button>
                        <button id="prev-btn" class="playback-btn prev-next-btn" title="上一首">↩︎</button>
                        <button id="next-btn" class="playback-btn prev-next-btn" title="下一首">↪︎</button>
                        <button id="fullscreen-btn" class="playback-btn fullscreen-btn" title="全屏">⛶</button>
                        <button id="screenshot-btn" class="playback-btn screenshot-btn" title="截图">📸</button>
                    </div>
                </div>
            </div>

              <aside class="playlist-section">
                  <div class="playlist-header">
                      <h3>播放列表</h3>
                      <div class="playlist-header-actions">
                          <button id="add-to-box-btn" class="add-to-box-btn" title="收藏到盒子">收藏</button>
                          <button id="history-btn" class="history-btn" title="历史记录">历史</button>
                      </div>
                  </div>
                  <div id="playlist" class="playlist"></div>
              </aside>
         </main>
     </div>

      <div id="player-history-modal" class="modal">
          <div class="modal-content">
              <div class="modal-header">
                  <h3>播放历史记录</h3>
                  <div class="modal-header-actions">
                      <button id="history-clear-btn" class="history-clear-btn" title="清空历史">清空</button>
                      <button class="modal-close-btn" id="history-close-btn">&times;</button>
                  </div>
              </div>
              <div class="modal-filter">
                  <input type="text" id="history-movie-filter" placeholder="电影名称筛选" class="filter-input">
                  <input type="date" id="history-date-filter" placeholder="日期筛选" class="filter-input">
              </div>
              <div class="modal-body">
                  <div id="history-list" class="history-list"></div>
              </div>
          </div>
      </div>

      <div id="player-add-to-box-modal" class="modal">
          <div class="modal-content">
              <div class="modal-header">
                  <h3>添加到电影盒子</h3>
                  <div class="modal-header-actions">
                      <button class="modal-close-btn" id="add-to-box-close-btn">&times;</button>
                  </div>
              </div>
              <div class="modal-body">
                  <p id="add-to-box-info" class="add-to-box-info"></p>
                  <div class="form-group">
                      <label>选择电影盒子：</label>
                      <select id="player-box-select" class="form-input">
                          <option value="">选择电影盒子...</option>
                      </select>
                  </div>
              </div>
              <div class="modal-footer">
                  <button id="confirm-add-to-box" class="btn btn-primary">确定</button>
                  <button id="cancel-add-to-box" class="btn btn-secondary">取消</button>
              </div>
          </div>
      </div>

     <script src="js/utils/common-utils.js"></script>
     <script src="js/player.js"></script>
 </body>
 </html>
