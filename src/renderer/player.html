<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' file:;">
    <title>电影播放器</title>
    <link rel="stylesheet" href="css/themes/dark.css">
    <link rel="stylesheet" href="css/player.css">
</head>
<body>
    <div id="app">
        <header class="player-header">
            <div id="player-title" class="player-title">电影播放</div>
            <div class="window-controls">
                <button id="minimize-btn" class="window-btn minimize-btn" title="最小化">─</button>
                <button id="maximize-btn" class="window-btn maximize-btn" title="最大化">□</button>
                <button id="close-btn" class="window-btn close-btn" title="关闭">&times;</button>
            </div>
        </header>

        <main class="player-content">
            <div class="video-section">
                <div class="video-container">
                    <video id="video-player" preload="metadata">
                        您的浏览器不支持 video 标签
                    </video>
                    <div id="subtitle-display" class="subtitle-display"></div>
                </div>
                <div class="video-controls">
                    <div class="controls-top-row">
                        <div class="progress-group">
                            <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0" step="0.1">
                            <div class="time-group">
                                <span id="current-time" class="time-display">00:00</span>
                                <span class="time-separator">/</span>
                                <span id="total-time" class="time-display">00:00</span>
                            </div>
                        </div>
                        <div class="volume-group">
                            <button id="mute-btn" class="volume-btn" title="静音">🔊</button>
                            <input type="range" id="volume-bar" class="volume-bar" min="0" max="100" value="100">
                        </div>
                    </div>
                    <div class="playback-controls">
                        <div class="playback-left"></div>
                        <div class="playback-center">
                            <button id="play-pause-btn" class="playback-btn play-btn" title="播放/暂停">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </button>
                            <button id="stop-btn" class="playback-btn stop-btn" title="停止">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <rect x="6" y="6" width="12" height="14"/>
                                </svg>
                            </button>
                            <button id="prev-btn" class="playback-btn prev-next-btn" title="上一首">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                                </svg>
                            </button>
                            <button id="next-btn" class="playback-btn prev-next-btn" title="下一首">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="playback-right">
                            <button id="subtitle-btn" class="playback-btn subtitle-btn" title="字幕切换">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM4 12h4v2H4v-2zm10 6H4v-2h10v2zm6 0h-4v-2h4v2zm0-4H10v-2h10v2z"/>
                                </svg>
                            </button>
                            <button id="fullscreen-btn" class="playback-btn fullscreen-btn" title="全屏">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                                </svg>
                            </button>
                            <button id="screenshot-btn" class="playback-btn screenshot-btn" title="截图">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <circle cx="12" cy="12" r="3.2"/>
                                    <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                                </svg>
                            </button>
                            <button id="playlist-toggle-btn" class="playback-btn playlist-toggle-btn" title="打开/关闭播放列表">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

              <aside class="playlist-section">
                  <div class="playlist-header">
                      <h3>播放列表</h3>
                      <div class="playlist-header-actions">
                          <button id="add-to-box-btn" class="add-to-box-btn" title="收藏">收藏</button>
                          <button id="history-btn" class="history-btn" title="历史记录">历史</button>
                      </div>
                  </div>
                  <div id="playlist" class="playlist"></div>
              </aside>
         </main>
     </div>

      <div id="player-history-modal" class="modal">
          <div class="modal-content">
              <div class="modal-header">
                  <h3>播放历史记录</h3>
                  <div class="modal-header-actions">
                      <button id="history-clear-btn" class="history-clear-btn" title="清空历史">清空</button>
                      <button class="modal-close-btn" id="history-close-btn">&times;</button>
                  </div>
              </div>
              <div class="modal-filter">
                  <input type="text" id="history-movie-filter" placeholder="电影名称筛选" class="filter-input">
                  <input type="date" id="history-date-filter" placeholder="日期筛选" class="filter-input">
              </div>
              <div class="modal-body">
                  <div id="history-list" class="history-list"></div>
              </div>
          </div>
      </div>

      <div id="player-add-to-box-modal" class="modal">
          <div class="modal-content">
              <div class="modal-header">
                  <h3>添加到电影收藏夹</h3>
                  <div class="modal-header-actions">
                      <button class="modal-close-btn" id="add-to-box-close-btn">&times;</button>
                  </div>
              </div>
              <div class="modal-body">
                  <p id="add-to-box-info" class="add-to-box-info"></p>
                  <div class="form-group">
                      <label>选择电影收藏夹：</label>
                      <select id="player-box-select" class="form-input">
                          <option value="">选择电影收藏夹...</option>
                      </select>
                  </div>
              </div>
              <div class="modal-footer">
                  <button id="confirm-add-to-box" class="btn btn-primary">确定</button>
                  <button id="cancel-add-to-box" class="btn btn-secondary">取消</button>
              </div>
          </div>
      </div>

      <div id="player-subtitle-modal" class="modal">
          <div class="modal-content">
              <div class="modal-header">
                  <h3>字幕切换</h3>
                  <div class="modal-header-actions">
                      <button class="modal-close-btn" id="subtitle-close-btn">&times;</button>
                  </div>
              </div>
              <div class="modal-body">
                  <p id="subtitle-info" class="subtitle-info"></p>
                  <div id="subtitle-list" class="subtitle-list"></div>
              </div>
              <div class="modal-footer">
                  <button id="confirm-subtitle" class="btn btn-primary">确定</button>
                  <button id="cancel-subtitle" class="btn btn-secondary">取消</button>
              </div>
          </div>
      </div>

       <div id="playlist-context-menu" class="context-menu">
           <div class="context-menu-item" data-action="play">
               <span>开始播放</span>
           </div>
           <div class="context-menu-item" data-action="subtitle-switch">
               <span>字幕切换</span>
           </div>
           <div class="context-menu-item" data-action="system-play">
               <span>使用系统播放器</span>
           </div>
           <div class="context-menu-item" data-action="open-folder">
               <span>打开文件夹</span>
           </div>
           <div class="context-menu-item" data-action="movie-detail">
               <span>电影详情</span>
           </div>
           <div class="context-menu-item" data-action="copy-path">
               <span>复制路径</span>
           </div>
       </div>

     <script src="js/utils/common-utils.js"></script>
     <script src="js/player.js"></script>
 </body>
 </html>
